# Default values for graphql-meter

replicaCount: 1

image:
  repository: ghcr.io/vanditsramblings/graphql-meter
  tag: "0.1.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8899

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt
  hosts:
    - host: graphql-meter.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: graphql-meter-tls
  #    hosts:
  #      - graphql-meter.local

# Sensitive configuration should come from a Secret, not plain values.
secret:
  existingSecret: ""
  jwtSecret: ""

# Non-sensitive environment variables passed to the container
env:
  MAX_CONCURRENT_RUNS: "3"
  ENABLE_K6: "true"
  ENABLE_LOCUST: "true"

# Persistent volume for SQLite data and run artifacts
persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 2Gi

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 1Gi

nodeSelector: {}
tolerations: []
affinity: {}
