{{- if not .Values.secret.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "graphql-meter.fullname" . }}
  labels:
    {{- include "graphql-meter.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ required "Set secret.jwtSecret or provide secret.existingSecret before deployment." .Values.secret.jwtSecret | quote }}
{{- end }}
