name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  JWT_SECRET: ci-test-secret-key-1234567890
  ENCRYPTION_KEY: ci-test-encryption-key-1234567890abcdef

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" build

      - name: Run Ruff
        run: python -m ruff check backend tests

      - name: Run mypy
        run: python -m mypy backend

      - name: Run dependency audit
        run: python -m pip_audit

      - name: Export OpenAPI spec
        run: python scripts/export_openapi.py

  test:
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" build

      - name: Download vendor libraries
        run: python -c "from backend.vendor_manager import ensure_vendor_libs; ensure_vendor_libs()"

      - name: Export OpenAPI spec
        run: python scripts/export_openapi.py

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify wheel contents
        run: |
          pip install dist/*.whl
          python -c "from backend.cli import main; print('CLI entry point OK')"
          python -c "from backend.k6_manager import find_k6; print('k6 manager OK')"
          python -c "from backend.vendor_manager import _find_frontend_dir; d = _find_frontend_dir(); assert d is not None, 'Frontend not bundled'; print(f'Frontend dir: {d}')"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/
            reference/openapi.json

  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies and generate lockfile
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip freeze > requirements.txt

      - name: Run Trivy vulnerability scan (filesystem)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-results.json
          exit-code: "0" # Always return 0 here, let Python handle the failure logic
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL # Tell Trivy to report ALL severities
          vuln-type: library
          ignore-unfixed: true
          scanners: vuln
        env:
          TRIVY_DETECTION_PRIORITY: comprehensive

      - name: Parse Results and Enforce Policy
        run: |
          python - <<'PY'
          import json, sys
          from collections import Counter
          
          with open("trivy-results.json", encoding="utf-8") as f:
              results = json.load(f).get("Results") or []
              
          scanned = [i for i in results if i.get("Target") not in ("", "-") and i.get("Type") not in ("", "-")]
          if not scanned: 
              print("ERROR: Trivy scanned zero supported targets.")
              sys.exit(1)
              
          severity_counts = Counter({'UNKNOWN': 0, 'LOW': 0, 'MEDIUM': 0, 'HIGH': 0, 'CRITICAL': 0})
          high_crit_count = 0
          
          print("========================================")
          print("      DETAILED VULNERABILITY LOG      ")
          print("========================================")
          
          for i in results:
              target = i.get("Target", "Unknown Target")
              vulns = i.get("Vulnerabilities") or []
              
              if vulns:
                  print(f"\nTarget: {target}")
                  for v in vulns:
                      pkg = v.get("PkgName", "Unknown")
                      sev = v.get("Severity", "UNKNOWN")
                      vid = v.get("VulnerabilityID", "UNKNOWN")
                      title = v.get("Title", "No title provided")
                      
                      # Increment counters
                      severity_counts[sev] += 1
                      if sev in {"HIGH", "CRITICAL"}:
                          high_crit_count += 1
                          
                      print(f"  [{sev.ljust(8)}] {pkg} ({vid}): {title}")
          
          print("\n========================================")
          print("        TOTAL DETECTION SUMMARY         ")
          print("========================================")
          for sev in ['CRITICAL', 'HIGH', 'MEDIUM', 'LOW', 'UNKNOWN']:
              print(f"{sev.ljust(10)}: {severity_counts[sev]}")
          
          print("----------------------------------------")
          print(f"Total Vulns : {sum(severity_counts.values())}")
          print("========================================\n")
              
          if high_crit_count > 0: 
              print(f"❌ ERROR: Pipeline failing due to {high_crit_count} HIGH/CRITICAL vulnerabilities.")
              sys.exit(1)
              
          print(f"✅ Success: No HIGH or CRITICAL vulnerabilities found. (Total scanned targets: {len(scanned)})")
          PY